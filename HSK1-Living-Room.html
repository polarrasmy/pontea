<style>
:root{--bg:#f4f3ef;--ink:#15120e;--soft:#e8e5de;--line:#d6d2c8;--dim:#aaa49a}

*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,"Segoe UI","Noto Sans Arabic",sans-serif;line-height:1.6}
.wrap{max-width:760px;margin:0 auto;padding:16px 14px 30px}
.top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.brand{font-size:18px;font-weight:600;letter-spacing:.3px}
.stats{font-size:13px;color:var(--dim)}
.stats b{color:var(--ink);font-weight:600}
.langs{display:flex;gap:5px}
.lg{font-size:12px;padding:5px 10px;border:1px solid var(--line);background:transparent;color:var(--dim);border-radius:20px;cursor:pointer}
.lg.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.taphint{text-align:center;color:var(--dim);font-size:13px;margin:10px 0 6px}
.room{border:1px solid var(--line);border-radius:18px;background:var(--soft);margin-top:6px;padding:30px 16px;min-height:54vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px}
.today{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;user-select:none}
.todayObj{width:128px;height:128px;border-radius:26px;background:var(--bg);border:2px solid var(--ink);display:flex;align-items:center;justify-content:center;overflow:hidden;text-align:center;line-height:1.04;animation:pulse 1.9s infinite}
.todayLbl{font-size:13px;color:var(--dim)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(140,128,100,0);transform:translateY(0)}50%{box-shadow:0 0 0 18px rgba(140,128,100,.12);transform:translateY(-3px)}}
.furniture{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;max-width:560px}
.fitem{width:64px;height:64px;border-radius:15px;background:var(--bg);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;overflow:hidden;text-align:center;line-height:1.04;opacity:.55;cursor:pointer;transition:opacity .2s,transform .1s}
.fitem:hover{opacity:1;transform:translateY(-2px)}
.fitem.due{opacity:.9;border-color:var(--ink)}
.empty{color:var(--dim);font-size:15px;text-align:center;max-width:360px}
.ov{position:fixed;inset:0;background:rgba(20,17,13,.55);display:none;align-items:center;justify-content:center;z-index:40;padding:16px}
.sheet{background:var(--bg);border:1px solid var(--line);border-radius:22px;max-width:440px;width:100%;max-height:92vh;overflow:auto;padding:18px 20px;text-align:center}
.sheetTop{display:flex;justify-content:flex-end}
.x{border:none;background:transparent;color:var(--dim);font-size:20px;cursor:pointer}
.bigObj{font-family:"Noto Emoji",sans-serif;font-size:62px;line-height:1;margin:0 0 6px;animation:rise .45s ease}
@keyframes rise{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.han{font-size:42px;font-weight:600;line-height:1.1}
.pin{font-size:20px;direction:ltr;margin-top:3px}
.mean{font-size:18px;margin-top:2px}
.pos{font-size:12px;color:var(--dim);direction:ltr}
.row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px}
.btn{border:1px solid var(--line);background:transparent;color:var(--ink);border-radius:12px;padding:10px 16px;font-size:14px;cursor:pointer;font-family:inherit}
.btn.primary{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.hills{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:14px 0 2px}
.hill{display:flex;flex-direction:column;align-items:center;gap:2px}
.hill span{font-size:13px;direction:ltr}
.sent{margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
.sent .lbl{font-size:12px;color:var(--dim);margin-bottom:4px}
.sentH{font-size:24px}
.sentP{font-size:15px;direction:ltr;color:var(--dim)}
.sentM{font-size:15px}
.hw{margin:12px auto 0;width:108px;height:108px;border:1px solid var(--line);border-radius:12px;display:none}
.foot{text-align:center;color:var(--dim);font-size:12px;margin-top:16px}
</style>
</head>
