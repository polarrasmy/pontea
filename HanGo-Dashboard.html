<title>Pontea · تقدّمي — Dashboard</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#15120e">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{--bg:#f4f3ef;--ink:#15120e;--soft:#e8e5de;--line:#d6d2c8;--dim:#9c968c}
@media (prefers-color-scheme:dark){:root{--bg:#100f0d;--ink:#ededea;--soft:#1b1a17;--line:#34302b;--dim:#6a655d}}
*{box-sizing:border-box}html,body{margin:0}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,"Segoe UI","Noto Sans Arabic",sans-serif;line-height:1.6}
.wrap{max-width:680px;margin:0 auto;padding:16px 14px 60px}
.top{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.brand{font-size:18px;font-weight:600}
.lgs{display:flex;gap:5px}
.lg{font-size:12px;padding:5px 10px;border:1px solid var(--line);background:transparent;color:var(--dim);border-radius:20px;cursor:pointer;text-decoration:none}
.lg.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:8px 0 18px}
.stat{background:var(--soft);border:1px solid var(--line);border-radius:14px;padding:14px 10px;text-align:center}
.stat .n{font-size:26px;font-weight:700}
.stat .l{font-size:12px;color:var(--dim);margin-top:2px}
.hero{background:var(--soft);border:1px solid var(--line);border-radius:16px;padding:18px;text-align:center;margin-bottom:16px}
.hero .big{font-size:40px;font-weight:700}
.hero .sub{font-size:13px;color:var(--dim)}
.bar{height:10px;background:var(--bg);border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-top:6px}
.bar>div{height:100%;background:var(--ink)}
.lv{margin-bottom:10px}
.lvtop{display:flex;justify-content:space-between;font-size:13px}
.lvtop .c{color:var(--dim)}
h2{font-size:15px;color:var(--ink);margin:18px 0 8px}
.links{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.lnk{display:flex;align-items:center;gap:10px;border:1px solid var(--line);background:var(--soft);border-radius:14px;padding:13px;text-decoration:none;color:inherit;font-size:14px}
.lnk:hover{border-color:var(--ink)}
.lnk .e{font-size:22px}
.foot{text-align:center;color:var(--dim);font-size:12px;margin-top:24px}
</style>
</head>
