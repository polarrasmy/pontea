 en:{title:"Stories",hint:"Pick a scene · tap any word to hear it and see its meaning",pick:"Pick a scene to learn from",back:"← Scenes",play:"▶ Play scene",stop:"■ Stop",pin:"Pinyin",tr:"Translation",reveal:"Reveal",foot:"Pontea · learn from the story — meaning from context · offline"},
 fr:{title:"Scènes",hint:"Choisis une scène · touche un mot pour l'entendre et voir son sens",pick:"Choisis une scène",back:"← Scènes",play:"▶ Lire la scène",stop:"■ Stop",pin:"Pinyin",tr:"Traduction",reveal:"Révéler",foot:"Pontea · apprends par l'histoire — le sens par le contexte · hors ligne"},
};
var L=(function(){try{return localStorage.getItem("hsk_lang")||"ar";}catch(e){return "ar";}})();
var showPin=true, showTr=false, cur=null, playing=false, playIdx=-1;
function S(){return STR[L];}
var voice=null;function lv(){var vs=speechSynthesis.getVoices();voice=vs.find(function(v){return /zh|chinese|ting|mei|yu|han/i.test(v.lang+" "+v.name)})||null;}
lv();if(speechSynthesis.onvoiceschanged!==undefined)speechSynthesis.onvoiceschanged=lv;
function say(t,cb){try{var u=new SpeechSynthesisUtterance(t);u.lang="zh-CN";u.rate=0.82;if(voice)u.voice=voice;if(cb)u.onend=cb;speechSynthesis.cancel();speechSynthesis.speak(u);}catch(e){if(cb)cb();}}
function el(t,c){var e=document.createElement(t);if(c)e.className=c;return e;}
function pin(s){return s.map(function(x){return x[0];}).join(" ");}
function seg(h){var toks=[],i=0;while(i<h.length){var m=null,L2;for(L2=4;L2>=1;L2--){var sub=h.substr(i,L2);if(VOCAB[sub]){m=sub;break;}}if(m){toks.push({t:m,k:true});i+=m.length;}else{toks.push({t:h.charAt(i),k:false});i+=1;}}return toks;}

function popup(h){var v=VOCAB[h];if(!v){say(h);return;}var box=document.getElementById("popbox");box.textContent="";
var ph=el("div","ph");ph.textContent=h;box.appendChild(ph);
var pp=el("div","pp");pp.textContent=pin(v.s);box.appendChild(pp);
var pm=el("div","pm");pm.textContent=v.tr[L];box.appendChild(pm);
var act=el("div","pact");var b1=el("button","btn");b1.textContent="🔊";b1.onclick=function(){say(h);};var b2=el("button","btn");b2.textContent="✕";b2.onclick=closePop;act.appendChild(b1);act.appendChild(b2);box.appendChild(act);
document.getElementById("pop").style.display="flex";say(h);}
function closePop(){document.getElementById("pop").style.display="none";}
document.getElementById("pop").onclick=function(e){if(e.target===this)closePop();};

function buildPanel(line,idx){var p=el("div","panel");p.setAttribute("data-i",idx);
var cn=el("div","cn");seg(line.h).forEach(function(tk){var sp=el("span","tok "+(tk.k?"k":"pu"));sp.textContent=tk.t;if(tk.k)sp.onclick=function(){popup(tk.t);};cn.appendChild(sp);});p.appendChild(cn);
var py=el("div","py");py.textContent=pin(line.s);py.style.display=showPin?"block":"none";py.className="py js-py";p.appendChild(py);
var tr=el("div","tr"+(showTr?"":" hidden"));tr.textContent=line.tr[L];tr.className="tr js-tr"+(showTr?"":" hidden");p.appendChild(tr);
var prow=el("div","prow");var pb=el("button","play1");pb.textContent="🔊";pb.onclick=function(){say(line.h);};prow.appendChild(pb);p.appendChild(prow);
p.onclick=function(e){if(e.target.classList.contains("tok"))return;var t=p.querySelector(".js-tr");t.classList.toggle("hidden");};
return p;}

function openScene(sc){cur=sc;stopPlay();var v=document.getElementById("view");v.textContent="";
var ctr=el("div","ctrls");
var back=el("button","btn");back.textContent=S().back;back.onclick=function(){renderList();};ctr.appendChild(back);
var play=el("button","btn");play.id="playBtn";play.textContent=S().play;play.onclick=togglePlay;ctr.appendChild(play);
var ppin=el("button","btn"+(showPin?" on":""));ppin.textContent=S().pin;ppin.onclick=function(){showPin=!showPin;ppin.classList.toggle("on",showPin);Array.prototype.forEach.call(document.querySelectorAll(".js-py"),function(n){n.style.display=showPin?"block":"none";});};ctr.appendChild(ppin);
var ptr=el("button","btn"+(showTr?" on":""));ptr.textContent=S().tr;ptr.onclick=function(){showTr=!showTr;ptr.classList.toggle("on",showTr);Array.prototype.forEach.call(document.querySelectorAll(".js-tr"),function(n){n.classList.toggle("hidden",!showTr);});};ctr.appendChild(ptr);
v.appendChild(ctr);
var head=el("div","sceneHead");var em=el("div","em");em.textContent=sc.emoji;var tt=el("div","tt");tt.textContent=sc.title[L];head.appendChild(em);head.appendChild(tt);v.appendChild(head);
sc.lines.forEach(function(line,idx){v.appendChild(buildPanel(line,idx));});}

function togglePlay(){if(playing)stopPlay();else startPlay();}
function startPlay(){if(!cur)return;playing=true;playIdx=-1;var b=document.getElementById("playBtn");if(b)b.textContent=S().stop;nextPlay();}
function stopPlay(){playing=false;speechSynthesis.cancel();var b=document.getElementById("playBtn");if(b)b.textContent=S().play;Array.prototype.forEach.call(document.querySelectorAll(".panel"),function(n){n.classList.remove("cur");});}
function nextPlay(){if(!playing)return;playIdx++;var panels=document.querySelectorAll(".panel");if(playIdx>=cur.lines.length){stopPlay();return;}
Array.prototype.forEach.call(panels,function(n){n.classList.remove("cur");});var p=panels[playIdx];if(p){p.classList.add("cur");p.scrollIntoView({behavior:"smooth",block:"center"});}
say(cur.lines[playIdx].h,function(){setTimeout(nextPlay,350);});}

function renderList(){stopPlay();cur=null;var v=document.getElementById("view");v.textContent="";
var g=el("div","scenes");
SCENES.forEach(function(sc){var c=el("div","scard");var em=el("div","em");em.textContent=sc.emoji;var box=el("div");var tt=el("div","tt");tt.textContent=sc.title[L];var sub=el("div","sub");sub.textContent=sc.lines.length+(L==="ar"?" جمل":(L==="fr"?" phrases":" lines"));box.appendChild(tt);box.appendChild(sub);c.appendChild(em);c.appendChild(box);c.onclick=function(){openScene(sc);};g.appendChild(c);});
v.appendChild(g);}

function applyLang(){document.documentElement.lang=L;document.documentElement.dir=(L==="ar")?"rtl":"ltr";
document.getElementById("tt").textContent=S().title;document.getElementById("hint").textContent=S().hint;document.getElementById("foot").textContent=S().foot;
Array.prototype.forEach.call(document.querySelectorAll(".lg[data-l]"),function(b){b.classList.toggle("on",b.getAttribute("data-l")===L);});
if(cur)openScene(cur);else renderList();}
Array.prototype.forEach.call(document.querySelectorAll(".lg[data-l]"),function(b){b.onclick=function(){L=b.getAttribute("data-l");try{localStorage.setItem("hsk_lang",L);}catch(e){}applyLang();};});
if("serviceWorker" in navigator && location.protocol.indexOf("http")===0)navigator.serviceWorker.register("sw.js").catch(function(){});
applyLang();
</script>
</body>
</html>
