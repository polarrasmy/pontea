<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HSK 1 — Complete Reference</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#C97D2E">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.7.0/dist/hanzi-writer.min.js" defer></script>
<style>
:root{--copper:#C97D2E;--bg:#f7f5f1;--card:#ffffff;--soft:#efebe3;--ink:#1c1a17;--mut:#6b6760;--line:#e3ddd3}
@media (prefers-color-scheme:dark){:root{--bg:#161514;--card:#232220;--soft:#1e1d1b;--ink:#ececec;--mut:#9b958c;--line:#34322e}}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,"Segoe UI","Noto Sans Arabic",sans-serif;line-height:1.6}
.wrap{max-width:980px;margin:0 auto;padding:18px 16px 60px}
header{text-align:center;margin-bottom:10px}
h1{margin:0;font-size:24px;font-weight:600}
h1 .zh{color:var(--copper)}
.sub{color:var(--mut);font-size:13px;margin-top:3px}
.stats{display:flex;gap:16px;justify-content:center;font-size:13px;color:var(--mut);margin:8px 0 2px}
.stats b{color:var(--copper);font-weight:600}
.langbar{display:flex;gap:6px;justify-content:center;margin:10px 0 6px;flex-wrap:wrap}
.lg{font-size:13px;padding:6px 13px;border-radius:20px;border:1px solid var(--line);background:var(--card);color:var(--mut);cursor:pointer}
.lg.on{background:var(--ink);border-color:var(--ink);color:var(--bg)}
.legend{display:flex;gap:11px;justify-content:center;flex-wrap:wrap;margin:6px 0 2px;font-size:13px;color:var(--mut);align-items:center}
.legend b{font-weight:600}
.t1{color:#E23B3B}.t2{color:#E08A00}.t3{color:#3FA34D}.t4{color:#2D6FD6}.t5{color:#9a948b}
input,button{font-family:inherit;font-size:14px;color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 12px;cursor:pointer}
input{min-width:220px}
.nav{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:10px 0 12px}
.nv{font-size:14px;padding:8px 13px}
.nv.on{background:var(--copper);border-color:var(--copper);color:#fff}
.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:center;margin:6px 0}
.chips{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:6px 0 14px}
.lchip{font-size:13px;padding:6px 11px;border-radius:20px;border:1px solid var(--line);background:var(--card);color:var(--mut);cursor:pointer}
.lchip.on{background:var(--copper);border-color:var(--copper);color:#fff}
.lhead{margin:20px 0 10px;font-size:15px;color:var(--copper);font-weight:600;border-bottom:1px solid var(--line);padding-bottom:6px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.card{position:relative;background:var(--card);border:1px solid var(--line);border-radius:14px;transition:border-color .15s}
.card:hover{border-color:var(--copper)}
.wcard{padding:16px 10px;text-align:center;cursor:pointer;min-height:138px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.han{font-size:34px;line-height:1.1}
.py{font-size:16px;direction:ltr;font-weight:500}
.py sub{font-size:9px}
.ans{visibility:hidden}
.wcard.show .ans{visibility:visible}
.ar{font-size:15px}
.pos{font-size:11px;color:var(--mut);direction:ltr}
.tag{position:absolute;top:7px;inset-inline-start:8px;font-size:10px;color:var(--mut);background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:1px 6px}
.say{position:absolute;top:6px;inset-inline-start:8px;border:none;background:transparent;color:var(--mut);font-size:17px;cursor:pointer;padding:2px 4px}
.say:hover{color:var(--copper)}
.wcard .say{top:auto;bottom:6px;inset-inline-start:auto;inset-inline-end:8px}
.strkb{position:absolute;bottom:6px;inset-inline-start:8px;border:none;background:transparent;color:var(--mut);font-size:15px;cursor:pointer;padding:2px 4px}
.strkb:hover{color:var(--copper)}
.star{position:absolute;top:5px;inset-inline-end:8px;border:none;background:transparent;color:var(--mut);font-size:17px;cursor:pointer;padding:2px 4px}
.star.kn{color:var(--copper)}
.scol{display:flex;flex-direction:column;gap:10px}
.srow{padding:12px 14px;text-align:start}
.srow-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.s-han{font-size:23px;line-height:1.35}
.sayrow{border:none;background:transparent;color:var(--mut);font-size:19px;cursor:pointer;padding:2px 6px}
.numgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:10px}
.numcell{position:relative;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 8px 10px;text-align:center}
.num-v{font-size:18px;font-weight:600;color:var(--copper);direction:ltr}
.num-h{font-size:26px;margin:3px 0}
.note{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:13px;color:var(--mut);margin-top:8px;text-align:start}
.gcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 16px;text-align:start;margin-bottom:10px}
.gt{font-weight:600;color:var(--copper);margin-bottom:4px}
.gb{font-size:14px}
.modebar{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
.mb{font-size:13px;padding:6px 12px;border-radius:18px;border:1px solid var(--line);background:var(--card);color:var(--mut);cursor:pointer}
.mb.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.quiz{max-width:480px;margin:10px auto;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px;text-align:center}
.qhan{font-size:56px;margin:6px 0}
.qbig{font-size:22px;margin:8px 0}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.opts button{padding:13px;border-radius:12px}
.opts .opt-han{font-size:24px}
.tones4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px}
.tones4 button{padding:14px 4px;font-size:18px;font-weight:600}
.feed{margin-top:14px;min-height:30px;font-size:16px;direction:ltr}
.rate{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px}
.rate button{padding:12px 4px;border-radius:10px;font-size:13px}
.prog{height:8px;background:var(--soft);border-radius:6px;overflow:hidden;margin:6px auto 2px;max-width:480px}
.prog>div{height:100%;background:var(--copper);width:0}
.muted{color:var(--mut);font-size:13px}
.big{font-size:40px;font-weight:600;color:var(--copper)}
.strk{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:50;padding:18px}
.strkbox{background:var(--card);border-radius:16px;padding:18px 18px 14px;max-width:94vw}
.strkrow{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:10px 0}
.hwc{border:1px solid var(--line);border-radius:10px;background:var(--bg)}
footer{text-align:center;color:var(--mut);font-size:12px;margin-top:30px}
</style>
</head>

<header>

</div>

<div id="view"></div>
<footer id="foot"></footer>
</div>
<div class="strk" id="ov"><div class="strkbox">

<div class="strkrow" id="ovbox"></div>
<button id="ovReplay"></button>
</div></div>

var items=DATA.filter(function(d){return (curL==="all"||String(d.l)===String(curL))&&matchQ(d.h+d.py+d.tr.ar+d.tr.en+d.tr.fr,qv)&&(!remainingOnly||!known.has(d.h));});
if(qv||remainingOnly){if(!items.length){var p=el("p","muted");p.style.textAlign="center";p.textContent=S().noRes+" 🎉";v.appendChild(p);}else{var g=el("div","grid");items.forEach(function(d){g.appendChild(buildCard(d));});v.appendChild(g);}return;}
groupRender(v,items,buildCard,"grid");}

function buildSent(d){var c=el("div","card srow");
var top=el("div","srow-top");var han=el("div","s-han");han.textContent=d.h;top.appendChild(han);top.appendChild(sayBtn(d.h,"sayrow"));c.appendChild(top);
var p=el("div","py");p.style.direction="ltr";p.innerHTML=py(d.s);c.appendChild(p);
var ar=el("div","ar");ar.textContent=d.tr[LANG];c.appendChild(ar);return c;}
function renderSentences(v){var qv=document.getElementById("q").value.trim().toLowerCase();
var items=SENT.filter(function(d){return (curL==="all"||String(d.l)===String(curL))&&matchQ(d.h+d.tr.ar+d.tr.en+d.tr.fr,qv);});
if(qv){var col=el("div","scol");items.forEach(function(d){col.appendChild(buildSent(d));});if(!items.length){var p=el("p","muted");p.textContent=S().noRes;v.appendChild(p);}else{v.appendChild(col);}return;}
groupRender(v,items,buildSent,"scol");}

function renderNumbers(v){NUMS.forEach(function(g){var h=el("div","lhead");h.textContent=g.t[LANG];v.appendChild(h);
var grid=el("div","numgrid");g.items.forEach(function(it){var c=el("div","numcell");c.appendChild(sayBtn(it.h));
var vv=el("div","num-v");vv.textContent=it.v;c.appendChild(vv);var hh=el("div","num-h");hh.textContent=it.h;c.appendChild(hh);c.appendChild(pyDiv(it.s));grid.appendChild(c);});v.appendChild(grid);});
var h2=el("div","lhead");h2.textContent=S().numNotes;v.appendChild(h2);NOTES.forEach(function(n){var d=el("div","note");d.textContent=n[LANG];v.appendChild(d);});}

function vocabGroups(v,groups,notes){groups.forEach(function(g){var h=el("div","lhead");h.textContent=g.t[LANG];v.appendChild(h);
var grid=el("div","numgrid");g.items.forEach(function(it){var c=el("div","numcell");c.appendChild(sayBtn(it.h));
if(it.e){var em=el("div");em.style.fontSize="24px";em.style.lineHeight="1";em.textContent=it.e;c.appendChild(em);}
var hh=el("div","num-h");hh.textContent=it.h;c.appendChild(hh);c.appendChild(pyDiv(it.s));
var ar=el("div","ar");ar.style.fontSize="13px";ar.style.marginTop="2px";ar.textContent=it.tr[LANG];c.appendChild(ar);grid.appendChild(c);});v.appendChild(grid);});
if(notes&&notes.length){var h2=el("div","lhead");h2.textContent=S().notes;v.appendChild(h2);notes.forEach(function(n){var d=el("div","note");d.textContent=n[LANG];v.appendChild(d);});}}
function renderThemes(v){vocabGroups(v,THEMES,null);}
function renderPinyin(v){vocabGroups(v,PIN,PINNOTES);}
function renderGrammar(v){GRAM.forEach(function(g){var c=el("div","gcard");var t=el("div","gt");t.textContent=g[LANG].t;var b=el("div","gb");b.textContent=g[LANG].b;c.appendChild(t);c.appendChild(b);v.appendChild(c);});}

function renderReview(v){rollDay();var t=todayStr();
var due=DATA.filter(function(d){var s=SRS[d.h];return !s||s.due<=t;});
var head=el("div","muted");head.style.textAlign="center";head.textContent=S().due+": "+due.length;v.appendChild(head);
if(!due.length){var p=el("div");p.style.cssText="text-align:center;margin-top:20px;font-size:18px";p.textContent=S().revDone;v.appendChild(p);return;}
var d=due[0];var box=el("div","quiz");v.appendChild(box);
var hh=el("div","qhan");hh.textContent=d.h;box.appendChild(hh);
box.appendChild(sayBtn(d.h));var sk=el("button");sk.style.marginInlineStart="6px";sk.textContent="✍️";sk.onclick=function(){openStroke(d.h);};box.appendChild(sk);
var rev=el("div");rev.style.marginTop="12px";box.appendChild(rev);
var show=el("button");show.textContent=S().reveal;show.onclick=function(){rev.innerHTML="";var p=el("div","py");p.style.fontSize="20px";p.innerHTML=py(d.s);var m=el("div","ar");m.style.fontSize="18px";m.textContent=d.tr[LANG];rev.appendChild(p);rev.appendChild(m);
var rt=el("div","rate");[["again",S().gAgain,"#E23B3B"],["hard",S().gHard,"#E08A00"],["good",S().gGood,"#3FA34D"],["easy",S().gEasy,"#2D6FD6"]].forEach(function(g){var b=el("button");b.textContent=g[1];b.style.borderColor=g[2];b.style.color=g[2];b.onclick=function(){grade(d,g[0]);};rt.appendChild(b);});rev.appendChild(rt);};
rev.appendChild(show);}
function grade(d,q){var s=SRS[d.h]||{ivl:0,reps:0};var ivl;
if(q==="again")ivl=0;else if(q==="hard")ivl=Math.max(1,Math.round((s.ivl||1)*1.2));else if(q==="good")ivl=s.ivl?Math.round(s.ivl*2.4):1;else ivl=s.ivl?Math.round(s.ivl*3.6):3;
s.ivl=ivl;s.reps=(s.reps||0)+1;s.due=ivl<=0?todayStr():addDays(todayStr(),ivl);SRS[d.h]=s;saveSRS();
if(ivl>=4)known.add(d.h),saveKnown();STK.rev++;saveSTK();bumpStreak();updateStats();render();}

var Q={s:0,t:0};
function renderQuiz(v){Q={s:0,t:0};
var mb=el("div","modebar");[["recog",S().qmRecog],["prod",S().qmProd],["listen",S().qmListen],["tone",S().qmTone]].forEach(function(m){var b=el("button","mb"+(quizMode===m[0]?" on":""));b.textContent=m[1];b.onclick=function(){quizMode=m[0];render();};mb.appendChild(b);});v.appendChild(mb);
var box=el("div","quiz");v.appendChild(box);quizRound(box);}
function quizRound(box){box.textContent="";
var pool=quizMode==="tone"?DATA.filter(function(d){return d.s.length===1;}):DATA;
var d=rand(pool);
var s=el("div","muted");s.textContent=(quizMode==="tone"?S().pickTone:S().qWhat)+" · "+S().qScore+" "+Q.s+"/"+Q.t;box.appendChild(s);
var feed=el("div","feed");
if(quizMode==="tone"){var hh=el("div","qhan");hh.textContent="🔊";box.appendChild(hh);say(d.h);
var sb=el("button");sb.textContent=S().qListen;sb.onclick=function(){say(d.h);};box.appendChild(sb);
var og=el("div","tones4");["1","2","3","4"].forEach(function(n){var b=el("button");b.textContent=n;b.style.color=TC[n];b.onclick=function(){toneAns(b,n,d,og,feed,box);};og.appendChild(b);});box.appendChild(og);box.appendChild(feed);return;}
if(quizMode==="listen"){var hh=el("div","qhan");hh.textContent="🔊";box.appendChild(hh);say(d.h);var sb=el("button");sb.textContent=S().qListen;sb.onclick=function(){say(d.h);};box.appendChild(sb);}
else if(quizMode==="prod"){var qb=el("div","qbig");qb.textContent=d.tr[LANG];box.appendChild(qb);}
else{var hh2=el("div","qhan");hh2.textContent=d.h;box.appendChild(hh2);var sb2=el("button");sb2.textContent=S().qListen;sb2.onclick=function(){say(d.h);};box.appendChild(sb2);}
var prod=quizMode==="prod";
var others=shuffle((prod?DATA.filter(function(x){return x.h!==d.h;}):DATA.filter(function(x){return x.tr[LANG]!==d.tr[LANG];}))).slice(0,3);
var opts=shuffle([d].concat(others));
var og=el("div","opts");
opts.forEach(function(o){var b=el("button",prod?"opt-han":"");b.textContent=prod?o.h:o.tr[LANG];b.onclick=function(){ansQ(b,o,d,og,feed,box,prod);};og.appendChild(b);});
box.appendChild(og);box.appendChild(feed);}
function ansQ(btn,o,d,og,feed,box,prod){Q.t++;Array.prototype.forEach.call(og.children,function(b){b.disabled=true;});
var ok=prod?(o.h===d.h):(o.tr[LANG]===d.tr[LANG]);
if(ok){Q.s++;btn.style.background="#3FA34D";btn.style.color="#fff";}else{btn.style.background="#E23B3B";btn.style.color="#fff";Array.prototype.forEach.call(og.children,function(b){if((prod&&b.textContent===d.h)||(!prod&&b.textContent===d.tr[LANG])){b.style.background="#3FA34D";b.style.color="#fff";}});}
say(d.h);feed.innerHTML='<span style="font-size:22px">'+d.h+'</span> &nbsp;<span>'+py(d.s)+'</span> &nbsp;'+d.tr[LANG]+'  ';
var nb=el("button");nb.textContent=S().qNext;nb.onclick=function(){quizRound(box);};feed.appendChild(nb);}
function toneAns(btn,n,d,og,feed,box){Q.t++;Array.prototype.forEach.call(og.children,function(b){b.disabled=true;});
var correct=String(d.s[0][1]);if(n===correct){Q.s++;btn.style.background="#3FA34D";btn.style.color="#fff";}else{btn.style.background="#E23B3B";btn.style.color="#fff";Array.prototype.forEach.call(og.children,function(b){if(b.textContent===correct){b.style.background="#3FA34D";b.style.color="#fff";}});}
feed.innerHTML='<span style="font-size:22px">'+d.h+'</span> &nbsp;<span>'+py(d.s)+'</span> &nbsp;'+d.tr[LANG]+'  ';
var nb=el("button");nb.textContent=S().qNext;nb.onclick=function(){quizRound(box);};feed.appendChild(nb);}

var EX={i:0,s:0,qs:[]};
function genExam(){var qs=[];var pool=DATA.slice();
function q(type){var d=rand(pool);var others=shuffle(DATA.filter(function(x){return x.tr[LANG]!==d.tr[LANG];})).slice(0,3);
 if(type==="han"){var o=shuffle(DATA.filter(function(x){return x.h!==d.h;})).slice(0,3);return {type:type,d:d,opts:shuffle([d].concat(o))};}
 return {type:type,d:d,opts:shuffle([d].concat(others))};}
for(var i=0;i<4;i++)qs.push(q("listen"));
for(var j=0;j<4;j++)qs.push(q("mean"));
for(var k=0;k<4;k++)qs.push(q("han"));
return shuffle(qs);}
function renderExam(v){
if(!EX.qs.length||EX.i>=EX.qs.length+1){var box=el("div","quiz");v.appendChild(box);var b=el("button");b.textContent=S().examStart;b.onclick=function(){EX={i:0,s:0,qs:genExam()};render();};box.appendChild(b);return;}
if(EX.i>=EX.qs.length){var box2=el("div","quiz");v.appendChild(box2);var big=el("div","big");big.textContent=EX.s+" / "+EX.qs.length;box2.appendChild(big);var lab=el("div","muted");lab.textContent=S().examResult;box2.insertBefore(lab,big);var ag=el("button");ag.textContent=S().examAgain;ag.onclick=function(){EX={i:0,s:0,qs:genExam()};render();};box2.appendChild(ag);return;}
var pr=el("div","prog");var bar=el("div");bar.style.width=Math.round(EX.i/EX.qs.length*100)+"%";pr.appendChild(bar);v.appendChild(pr);
var Qx=EX.qs[EX.i];var d=Qx.d;var box=el("div","quiz");v.appendChild(box);
var head=el("div","muted");head.textContent=S().examQ+" "+(EX.i+1)+"/"+EX.qs.length+" · "+(Qx.type==="listen"?S().examListen:(Qx.type==="han"?S().examHan:S().examMean));box.appendChild(head);
if(Qx.type==="listen"){var hh=el("div","qhan");hh.textContent="🔊";box.appendChild(hh);say(d.h);var sb=el("button");sb.textContent=S().qListen;sb.onclick=function(){say(d.h);};box.appendChild(sb);}
else if(Qx.type==="han"){var qb=el("div","qbig");qb.textContent=d.tr[LANG];box.appendChild(qb);}
else{var hh2=el("div","qhan");hh2.textContent=d.h;box.appendChild(hh2);}
var feed=el("div","feed");var og=el("div","opts");var prod=Qx.type==="han";
Qx.opts.forEach(function(o){var b=el("button",prod?"opt-han":"");b.textContent=prod?o.h:o.tr[LANG];b.onclick=function(){examAns(b,o,d,og,feed,prod);};og.appendChild(b);});
box.appendChild(og);box.appendChild(feed);}
function examAns(btn,o,d,og,feed,prod){Array.prototype.forEach.call(og.children,function(b){b.disabled=true;});
var ok=prod?(o.h===d.h):(o.tr[LANG]===d.tr[LANG]);if(ok){EX.s++;btn.style.background="#3FA34D";btn.style.color="#fff";}else{btn.style.background="#E23B3B";btn.style.color="#fff";Array.prototype.forEach.call(og.children,function(b){if((prod&&b.textContent===d.h)||(!prod&&b.textContent===d.tr[LANG])){b.style.background="#3FA34D";b.style.color="#fff";}});}
say(d.h);feed.innerHTML='<span style="font-size:22px">'+d.h+'</span> '+py(d.s)+' '+d.tr[LANG]+'  ';
var nb=el("button");nb.textContent=S().qNext;nb.onclick=function(){EX.i++;render();};feed.appendChild(nb);}

function updateStats(){document.getElementById("stStreak").innerHTML="<b>🔥 "+STK.count+"</b> "+S().streak;
rollDay();var done=Math.min(STK.rev,GOAL);document.getElementById("stGoal").innerHTML=S().goal+" <b>"+done+"/"+GOAL+"</b>";}

function render(){var v=document.getElementById("view");v.textContent="";
var showLes=(section==="words"||section==="sentences");
document.getElementById("chips").style.display=showLes?"flex":"none";
document.getElementById("q").style.display=showLes?"":"none";
var hint=document.getElementById("hint");hint.textContent=section==="words"?S().hintWords:(section==="sentences"?S().hintSent:"");hint.style.display=showLes?"":"none";
if(section==="words")renderWords(v);else if(section==="sentences")renderSentences(v);else if(section==="grammar")renderGrammar(v);
else if(section==="numbers")renderNumbers(v);else if(section==="themes")renderThemes(v);else if(section==="pinyin")renderPinyin(v);
else if(section==="review")renderReview(v);else if(section==="quiz")renderQuiz(v);else renderExam(v);}

function applyLang(){var c=S();document.documentElement.lang=LANG;document.documentElement.dir=(LANG==="ar")?"rtl":"ltr";
document.getElementById("title2").textContent=c.title;document.getElementById("sub").textContent=c.sub;document.getElementById("foot").textContent=c.footer;
document.getElementById("lgt").textContent=c.tones;for(var i=1;i<=5;i++)document.getElementById("lg"+i).textContent=c["t"+i];
Array.prototype.forEach.call(document.querySelectorAll(".nv"),function(b){b.textContent=c[b.getAttribute("data-sec")];});
document.getElementById("q").placeholder=c.search;document.getElementById("ovClose").textContent=c.close;document.getElementById("ovReplay").textContent=c.replay;
Array.prototype.forEach.call(document.querySelectorAll(".lg[data-l]"),function(b){b.classList.toggle("on",b.getAttribute("data-l")===LANG);});
try{localStorage.setItem("hsk_lang",LANG);}catch(e){}updateStats();chips();render();}

Array.prototype.forEach.call(document.querySelectorAll(".lg[data-l]"),function(b){b.onclick=function(){LANG=b.getAttribute("data-l");applyLang();};});
document.getElementById("tnBtn").onclick=function(){toneNum=!toneNum;try{localStorage.setItem("hsk_tn",toneNum?"1":"0");}catch(e){}this.classList.toggle("on",toneNum);render();};
Array.prototype.forEach.call(document.querySelectorAll(".nv"),function(b){b.onclick=function(){section=b.getAttribute("data-sec");Array.prototype.forEach.call(document.querySelectorAll(".nv"),function(x){x.classList.toggle("on",x===b);});render();};});
document.getElementById("q").addEventListener("input",render);
document.getElementById("ovClose").onclick=function(){document.getElementById("ov").style.display="none";speechSynthesis.cancel();};
document.getElementById("ov").onclick=function(e){if(e.target===this)this.style.display="none";};
document.getElementById("ovReplay").onclick=replayStroke;
if(toneNum)document.getElementById("tnBtn").classList.add("on");
if("serviceWorker" in navigator && location.protocol.indexOf("http")===0){navigator.serviceWorker.register("sw.js").catch(function(){});}
applyLang();
</script>
