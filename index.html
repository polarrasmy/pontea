<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pontea · تعلّم الصيني · Learn Chinese</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#15120e">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Emoji:wght@400..700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f3ef;--ink:#15120e;--soft:#ebe8e1;--line:#d6d2c8;--dim:#a8a39a;--accent:#C97D2E}
@media (prefers-color-scheme:dark){:root{--bg:#100f0d;--ink:#ededea;--soft:#1b1a17;--line:#34302b;--dim:#6a655d}}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:var(--bg);color:var(--ink);font-family:-apple-system,"Segoe UI","Noto Sans Arabic",sans-serif;line-height:1.6;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 16px}
.head{text-align:center;margin-bottom:22px}
.zh{font-size:40px;font-weight:600;letter-spacing:1px}
h1{margin:6px 0 2px;font-size:22px;font-weight:600}
.sub{color:var(--dim);font-size:14px}
.langs{display:flex;gap:6px;justify-content:center;margin-top:14px}
.lg{font-size:13px;padding:6px 13px;border:1px solid var(--line);background:transparent;color:var(--dim);border-radius:20px;cursor:pointer}
.lg.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:720px}
@media (max-width:620px){.cards{grid-template-columns:1fr}}
.card{display:block;text-decoration:none;color:inherit;background:var(--soft);border:1px solid var(--line);border-radius:20px;padding:26px 22px;text-align:center;transition:transform .12s,border-color .12s}
.card:hover{transform:translateY(-3px);border-color:var(--ink)}
.card.new{border-color:var(--ink)}
.ico{font-family:"Noto Emoji",sans-serif;font-size:48px;line-height:1}
.badge{display:inline-block;font-size:11px;padding:2px 10px;border-radius:20px;background:var(--ink);color:var(--bg);margin-bottom:10px}
.ct{font-size:20px;font-weight:600;margin:8px 0 4px}
.cs{font-size:13.5px;color:var(--dim)}
.extra{margin-top:18px}
.extra a{color:var(--dim);font-size:13px;text-decoration:none;border-bottom:1px dotted var(--line);padding-bottom:1px}
.foot{color:var(--dim);font-size:12px;margin-top:22px;text-align:center}
</style>
</head>
<body>
<div class="head">
<div class="zh">Pontea</div>
<h1 data-ar="اختار طريقتك" data-en="Choose your way" data-fr="Choisis ta méthode"></h1>
<div class="sub" data-ar="نفس المحتوى — طريقتين للتعلّم" data-en="Same content — two ways to learn" data-fr="Même contenu — deux façons d'apprendre"></div>
<div class="langs" id="langs"><button class="lg" data-l="ar">العربية</button><button class="lg" data-l="en">English</button><button class="lg" data-l="fr">Français</button></div>
</div>
<div class="cards">
<a class="card new" href="HanGo-Scenes.html">
<div class="badge" data-ar="جديد ⭐" data-en="New ⭐" data-fr="Nouveau ⭐"></div>
<div class="ico">📖</div>
<div class="ct" data-ar="المشاهد" data-en="Stories" data-fr="Scènes"></div>
<div class="cs" data-ar="اتعلم من قصص صغيرة — المعنى من السياق + نطق" data-en="Learn from short stories — meaning from context + audio" data-fr="Apprends par de courtes histoires — le sens par le contexte"></div>
</a>
<a class="card new" href="HSK1-Living-Room.html">
<div class="badge" data-ar="جديد" data-en="New" data-fr="Nouveau"></div>
<div class="ico">🏠</div>
<div class="ct" data-ar="الأوضة الحيّة" data-en="The Living Room" data-fr="La Pièce Vivante"></div>
<div class="cs" data-ar="اتعلم باللعب — حاجة واحدة كل يوم، سهلة لأي سن" data-en="Learn by play — one thing a day, easy at any age" data-fr="Apprends en jouant — une chose par jour, facile à tout âge"></div>
</a>
<a class="card" href="HSK1-Flashcards.html">
<div class="ico">📚</div>
<div class="ct" data-ar="المرجع الكامل" data-en="The Complete Reference" data-fr="La Référence Complète"></div>
<div class="cs" data-ar="كل الكلمات والجُمل والقواعد والأرقام والاختبارات" data-en="All words, sentences, grammar, numbers & tests" data-fr="Tous les mots, phrases, grammaire, nombres et tests"></div>
</a>
<a class="card" href="HanGo-Culture.html">
<div class="ico">🏮</div>
<div class="ct" data-ar="الثقافة" data-en="Culture" data-fr="Culture"></div>
<div class="cs" data-ar="ليه نتعلّم؟ — أعياد وأكل وعادات الصين" data-en="Why learn? — China's festivals, food & customs" data-fr="Pourquoi ? — fêtes, cuisine et coutumes de Chine"></div>
</a>
<a class="card" href="HanGo-Dashboard.html">
<div class="ico">📊</div>
<div class="ct" data-ar="تقدّمي" data-en="My Progress" data-fr="Ma progression"></div>
<div class="cs" data-ar="كل تقدّمك في مكان واحد — الكلمات والـstreak والمراجعة" data-en="All your progress in one place — words, streak, reviews" data-fr="Toute ta progression — mots, série, révisions"></div>
</a>
</div>
<div class="extra">
<a href="HSK1-Writing-Practice.html" data-ar="✍️ كراسة كتابة الحروف (للطباعة)" data-en="✍️ Character writing book (printable)" data-fr="✍️ Cahier d'écriture (imprimable)"></a>
</div>
<div class="foot" data-ar="Pontea · HSK 1-9 · يشتغل أونلاين وأوفلاين" data-en="Pontea · HSK 1-9 · works online & offline" data-fr="Pontea · HSK 1-9 · en ligne et hors ligne"></div>
<script>
var L=(function(){try{return localStorage.getItem("hsk_lang")||"ar";}catch(e){return "ar";}})();
function apply(){document.documentElement.lang=L;document.documentElement.dir=(L==="ar")?"rtl":"ltr";
Array.prototype.forEach.call(document.querySelectorAll("[data-ar]"),function(n){var v=n.getAttribute("data-"+L);if(v!=null)n.textContent=v;});
Array.prototype.forEach.call(document.querySelectorAll(".lg"),function(b){b.classList.toggle("on",b.getAttribute("data-l")===L);});}
Array.prototype.forEach.call(document.querySelectorAll(".lg"),function(b){b.onclick=function(){L=b.getAttribute("data-l");try{localStorage.setItem("hsk_lang",L);}catch(e){}apply();};});
if("serviceWorker" in navigator && location.protocol.indexOf("http")===0)navigator.serviceWorker.register("sw.js").catch(function(){});
apply();
</script>
</body>
</html>
